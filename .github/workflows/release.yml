name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Publish a GitHub Release (true/false)'
        required: false
        default: 'false'
      tag_name:
        description: 'Tag to publish for manual runs (required when publish_release=true)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build-customer:
    name: customer-${{ matrix.platform.os_name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: linux-x64
            runner: ubuntu-latest
            runtime_target: linux-x86_64
            bundle_targets: deb,rpm
          - os_name: windows-x64
            runner: windows-latest
            runtime_target: windows-x86_64
            bundle_targets: nsis,msi
          - os_name: macos-x64
            runner: macos-13
            runtime_target: macos-x86_64
            bundle_targets: app,dmg
          - os_name: macos-aarch64
            runner: macos-14
            runtime_target: macos-aarch64
            bundle_targets: app,dmg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            desktop-file-utils
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Install desktop app dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bundled runtime input
        if: runner.os != 'Windows'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash scripts/build-bundled-runtime-unix.sh "${{ matrix.platform.runtime_target }}"

      - name: Build bundled runtime input
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .\scripts\build-bundled-runtime-windows.ps1 -Target "${{ matrix.platform.runtime_target }}"

      - name: Stage bundled runtime
        shell: bash
        run: |
          FORCE_REPLACE=1 bash scripts/prepare-bundled-runtime.sh "${{ matrix.platform.runtime_target }}"
          bash .scripts/scan-bundled-runtime.sh

      - name: Verify customer updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: test -n "$TAURI_SIGNING_PRIVATE_KEY"

      - name: Build customer Tauri bundles
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm run tauri build --config src-tauri/tauri.conf.json --bundles "${{ matrix.platform.bundle_targets }}" -- --bin shorts_tauri_app

      - name: Collect customer bundles
        shell: bash
        run: |
          rm -rf release-artifact
          mkdir -p release-artifact
          for dir in target app/src-tauri/target; do
            [ -d "$dir" ] || continue
            find "$dir" -type f \( \
              -name '*.AppImage' -o \
              -name '*.app.tar.gz' -o \
              -name '*.deb' -o \
              -name '*.dmg' -o \
              -name '*.exe' -o \
              -name '*.msi' -o \
              -name '*.rpm' -o \
              -name '*.sig' \
            \)
          done | while IFS= read -r file; do
            dest="release-artifact/${file#./}"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
          done
          find release-artifact -type f -print
          test -n "$(find release-artifact -type f -print -quit)"

      - name: Upload customer bundles
        uses: actions/upload-artifact@v4
        with:
          name: customer-${{ matrix.platform.os_name }}
          path: release-artifact/**/*
          if-no-files-found: error

  build-admin:
    name: admin-${{ matrix.platform.os_name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os_name: linux-x64
            runner: ubuntu-latest
            runtime_target: linux-x86_64
            bundle_targets: deb,rpm
          - os_name: windows-x64
            runner: windows-latest
            runtime_target: windows-x86_64
            bundle_targets: nsis,msi
          - os_name: macos-x64
            runner: macos-13
            runtime_target: macos-x86_64
            bundle_targets: app,dmg
          - os_name: macos-aarch64
            runner: macos-14
            runtime_target: macos-aarch64
            bundle_targets: app,dmg
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm
        run: corepack enable

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            desktop-file-utils
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Install desktop app dependencies
        run: pnpm install --frozen-lockfile

      - name: Build bundled runtime input
        if: runner.os != 'Windows'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash scripts/build-bundled-runtime-unix.sh "${{ matrix.platform.runtime_target }}"

      - name: Build bundled runtime input
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: .\scripts\build-bundled-runtime-windows.ps1 -Target "${{ matrix.platform.runtime_target }}"

      - name: Stage bundled runtime
        shell: bash
        run: |
          FORCE_REPLACE=1 bash scripts/prepare-bundled-runtime.sh "${{ matrix.platform.runtime_target }}"
          bash .scripts/scan-bundled-runtime.sh

      - name: Build admin Tauri bundles
        working-directory: app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: pnpm run tauri build --config src-tauri/tauri.admin.conf.json --bundles "${{ matrix.platform.bundle_targets }}" -- --bin admin_desktop

      - name: Collect admin bundles
        shell: bash
        run: |
          rm -rf release-artifact
          mkdir -p release-artifact
          for dir in target app/src-tauri/target; do
            [ -d "$dir" ] || continue
            find "$dir" -type f \( \
              -name '*.AppImage' -o \
              -name '*.app.tar.gz' -o \
              -name '*.deb' -o \
              -name '*.dmg' -o \
              -name '*.exe' -o \
              -name '*.msi' -o \
              -name '*.rpm' -o \
              -name '*.sig' \
            \)
          done | while IFS= read -r file; do
            dest="release-artifact/${file#./}"
            mkdir -p "$(dirname "$dest")"
            cp "$file" "$dest"
          done
          find release-artifact -type f -print
          test -n "$(find release-artifact -type f -print -quit)"

      - name: Upload admin bundles
        uses: actions/upload-artifact@v4
        with:
          name: admin-${{ matrix.platform.os_name }}
          path: release-artifact/**/*
          if-no-files-found: error

  source-archive:
    name: source-archive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ inputs.tag_name || 'manual' }}}"
          mkdir -p release
          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./app/node_modules' \
            --exclude='./target' \
            --exclude='./app/src-tauri/target' \
            -czf "release/ai-youtube-shorts-generator-${VERSION}.tar.gz" .
          sha256sum "release/ai-youtube-shorts-generator-${VERSION}.tar.gz" \
            > "release/ai-youtube-shorts-generator-${VERSION}.sha256"

      - name: Upload source archive
        uses: actions/upload-artifact@v4
        with:
          name: source-archive
          path: release/*

  publish-release:
    name: publish-release
    needs:
      - build-customer
      - build-admin
      - source-archive
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release == 'true' && inputs.tag_name != '')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate customer updater manifest
        env:
          RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          node .scripts/generate-customer-updater-manifest.mjs \
            --input release-assets \
            --assets-dir release-upload \
            --out release-upload/customer-latest.json \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${RELEASE_TAG}" \
            --version "${VERSION}" \
            --notes "Customer app update ${VERSION}" \
            --pub-date "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Publish GitHub Release with all artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag_name }}
          name: Release ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.tag_name }}
          draft: false
          prerelease: false
          files: |
            release-upload/**
            release-assets/customer-linux-x64/**
            release-assets/customer-windows-x64/**
            release-assets/customer-macos-x64/**
            release-assets/customer-macos-aarch64/**
            release-assets/admin-linux-x64/**
            release-assets/admin-windows-x64/**
            release-assets/admin-macos-x64/**
            release-assets/admin-macos-aarch64/**
            release-assets/source-archive/**
